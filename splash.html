<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TASY - Abertura</title>
<meta name="theme-color" content="#1d4e80">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="css/styles.css?v=20260306scp2">
<link rel="stylesheet" href="css/mobile.css?v=20260306scp1">
<style>
  * { box-sizing: border-box; }

  body.login-page {
    margin: 0;
    min-height: 100vh;
  }

  .splash-card {
    width: 100vw;
    max-width: 100vw;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 14px;
    padding: 28px 20px;
    background: linear-gradient(180deg, #1d4e80 0%, #18456f 100%);
    border: 0;
    border-radius: 0;
    box-shadow: none;
    margin: 0 auto;
  }

  /* Sobrescreve o estilo base do login para manter a foto central na splash */
  .splash-card .msn-orbita-grande {
    position: relative !important;
    top: auto !important;
    right: auto !important;
    left: auto !important;
    transform: none !important;
    width: min(92vw, 800px);
    aspect-ratio: 4 / 3;
    height: auto;
    margin: 0 auto;
    animation: none;
    border-radius: 16px;
    overflow: hidden;
    border: 3px solid #9ab7d3;
    background: #d9e7f4;
    display: grid;
    place-items: center;
    animation: none !important;
  }
  .splash-card .msn-orbita-grande img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    border: 0;
    border-radius: 0;
  }

  .splash-frase {
    margin: 0;
    color: #ffffff;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 800;
    letter-spacing: 1.8px;
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
    line-height: 1.2;
    animation: splash-text-in 900ms ease-out both;
    animation-delay: 120ms;
  }

  @keyframes splash-frame-in {}
  @keyframes splash-msn-swing {}

  @keyframes splash-text-in {
    from {
      opacity: 0;
      transform: translateY(8px);
      letter-spacing: 1px;
    }
    to {
      opacity: 1;
      transform: translateY(0);
      letter-spacing: 1.8px;
    }
  }

  @media (max-width: 720px) {
    .splash-card {
      padding: 22px 14px;
      gap: 12px;
    }
  }
</style>
</head>
<body class="login-page">
  <main class="login-card splash-card">
    <div class="msn-orbita msn-orbita-grande" aria-hidden="true">
      <img id="splashAvatar" src="images/avatar.jpg?v=20260305fixavatar3" alt="" onerror="this.onerror=null;this.src='images/avatar.svg?v=20260305fixavatar3'">
    </div>
    <p class="splash-frase">EQUIPE T33</p>
  </main>
  <script src="js/auth.js?v=20260305av"></script>
  <script>
    (function () {
      const sessao = window.TASYAuth?.obterSessao?.();
      if (!sessao) {
        window.location.replace("login.html");
        return;
      }
      const avatar = document.getElementById("splashAvatar");
      if (avatar) {
        avatar.src = `images/avatar.jpg?v=20260305fixavatar3_${Date.now()}`;
      }
      setTimeout(() => {
        window.location.replace("T33.html");
      }, 3000);
    })();
  </script>
</body>
</html>
