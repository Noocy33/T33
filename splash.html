<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base href="/">
<title>TASY - Abertura</title>
<meta name="theme-color" content="#1d4e80">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="css/styles.css?v=20260305z">
<link rel="stylesheet" href="css/mobile.css?v=20260305z">
<style>
  * { box-sizing: border-box; }

  body.login-page {
    margin: 0;
    min-height: 100vh;
  }

  .splash-card {
    width: 100vw;
    max-width: 100vw;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 14px;
    padding: 28px 20px;
    background: linear-gradient(180deg, #1d4e80 0%, #18456f 100%);
    border: 0;
    border-radius: 0;
    box-shadow: none;
    margin: 0 auto;
  }

  /* Sobrescreve o estilo base do login para manter a foto central na splash */
  .splash-card .msn-orbita-grande {
    position: relative !important;
    top: auto !important;
    right: auto !important;
    left: auto !important;
    transform: none !important;
    width: min(92vw, 800px);
    aspect-ratio: 4 / 3;
    height: auto;
    margin: 0 auto;
    animation: none;
    border-radius: 16px;
    overflow: hidden;
    border: 3px solid #9ab7d3;
    background: #d9e7f4;
    display: grid;
    place-items: center;
    animation:
      splash-frame-in 760ms ease-out both,
      splash-msn-swing 2100ms ease-in-out 760ms infinite alternate;
  }
  .splash-card .msn-orbita-grande img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    border: 0;
    border-radius: 0;
  }

  .splash-frase {
    margin: 0;
    color: #ffffff;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 800;
    letter-spacing: 1.8px;
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
    line-height: 1.2;
    animation: splash-text-in 900ms ease-out both;
    animation-delay: 120ms;
  }

  @keyframes splash-frame-in {
    from {
      opacity: 0;
      transform: translateY(12px) scale(0.95);
      filter: saturate(0.9);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: saturate(1);
    }
  }

  @keyframes splash-msn-swing {
    from {
      transform: rotate(-2deg) translateY(0);
    }
    to {
      transform: rotate(2deg) translateY(-2px);
    }
  }

  @keyframes splash-text-in {
    from {
      opacity: 0;
      transform: translateY(8px);
      letter-spacing: 1px;
    }
    to {
      opacity: 1;
      transform: translateY(0);
      letter-spacing: 1.8px;
    }
  }

  @media (max-width: 720px) {
    .splash-card {
      padding: 22px 14px;
      gap: 12px;
    }
  }
</style>
</head>
<body class="login-page">
  <main class="login-card splash-card">
    <div class="msn-orbita msn-orbita-grande" aria-hidden="true">
      <img id="splashAvatar" src="/images/avatar.svg?v=20260302f" alt="" onerror="this.src='/images/avatar.svg?v=20260302f'">
    </div>
    <p class="splash-frase">EQUIPE T33</p>
  </main>
  <script src="js/auth.js?v=20260305z"></script>
  <script>
    (function () {
      const DEFAULT_AVATAR_URL = "data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='256' height='256' viewBox='0 0 256 256'%3E%3Crect width='256' height='256' rx='28' fill='%231d4e80'/%3E%3Ccircle cx='128' cy='96' r='46' fill='%23c8d8e9'/%3E%3Cpath d='M52 214c10-34 41-57 76-57s66 23 76 57' fill='%23c8d8e9'/%3E%3Crect x='80' y='176' width='96' height='50' rx='14' fill='%23123b61'/%3E%3Ctext x='128' y='211' text-anchor='middle' font-family='Segoe UI, Arial, sans-serif' font-size='34' font-weight='700' fill='%23ffffff'%3ET33%3C/text%3E%3C/svg%3E";
      const sessao = window.TASYAuth?.obterSessao?.();
      if (!sessao) {
        window.location.replace("login.html");
        return;
      }
      const avatar = document.getElementById("splashAvatar");
      if (avatar) {
        avatar.src = DEFAULT_AVATAR_URL;
        const foto = window.TASYAuth?.obterFotoAdminExibicao?.();
        if (foto) {
          if (String(foto).startsWith("data:image/")) {
            avatar.src = foto;
          } else {
            const sep = String(foto).includes("?") ? "&" : "?";
            avatar.src = `${foto}${sep}v=${Date.now()}`;
          }
        }
      }
      setTimeout(() => {
        window.location.replace("T33.html");
      }, 3000);
    })();
  </script>
</body>
</html>
