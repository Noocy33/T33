<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TASY - Login</title>
<meta name="theme-color" content="#1d4e80">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/mobile.css">
</head>
<body class="login-page">
  <main class="login-card">
    <h1>DIMENSIONAMENTO DE ENFERMAGEM</h1>
    <p>Acesso restrito para equipe autorizada</p>
    <form id="loginForm" class="login-form" autocomplete="on">
      <div class="login-avatar-wrap">
        <img id="loginAvatar" src="images/avatar.svg" alt="Foto do usuario" class="login-avatar">
        <div id="loginAvatarNome" class="login-avatar-nome">Bem-vindo</div>
      </div>
      <label>Usuario
        <input type="text" id="loginUsuario" placeholder="Digite o usuario" required>
      </label>
      <label>Senha
        <input type="password" id="loginSenha" placeholder="Digite a senha" required>
      </label>
      <button type="submit">Entrar</button>
      <a href="register.html" class="login-link">Solicitar cadastro</a>
      <label>Link Equipe T33 (copiar e colar)
        <input type="text" id="linkSistema" readonly>
      </label>
      <button type="button" id="btnCopiarLink" class="secundario">Copiar link</button>
      <div id="loginErro" class="login-erro" role="alert" aria-live="polite"></div>
    </form>
  </main>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
