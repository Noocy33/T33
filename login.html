<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base href="/">
<title>TASY - Login</title>
<meta name="theme-color" content="#1d4e80">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="css/styles.css?v=20260305av">
<link rel="stylesheet" href="css/mobile.css?v=20260305av">
</head>
<body class="login-page">
  <main class="login-card">
    <h1>DIMENSIONAMENTO DE ENFERMAGEM</h1>
    <form id="loginForm" class="login-form" autocomplete="on">
      <div class="login-avatar-wrap">
        <img id="loginAvatar" src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='256' height='256' viewBox='0 0 256 256'%3E%3Crect width='256' height='256' rx='28' fill='%231d4e80'/%3E%3Ccircle cx='128' cy='96' r='46' fill='%23c8d8e9'/%3E%3Cpath d='M52 214c10-34 41-57 76-57s66 23 76 57' fill='%23c8d8e9'/%3E%3Crect x='80' y='176' width='96' height='50' rx='14' fill='%23123b61'/%3E%3Ctext x='128' y='211' text-anchor='middle' font-family='Segoe UI, Arial, sans-serif' font-size='34' font-weight='700' fill='%23ffffff'%3ET33%3C/text%3E%3C/svg%3E" alt="Foto do usuario" class="login-avatar">
        <div id="loginAvatarNome" class="login-avatar-nome">Bem-vindo</div>
      </div>
      <label>Usuario
        <input type="text" id="loginUsuario" placeholder="Digite o usuario" required>
      </label>
      <label>Senha
        <input type="password" id="loginSenha" placeholder="Digite a senha" required>
      </label>
      <button type="submit">Entrar</button>
      <div id="loginErro" class="login-erro" role="alert" aria-live="polite"></div>
    </form>
  </main>
  <script src="js/auth.js?v=20260305av"></script>
  <script src="js/login.js?v=20260305av"></script>
</body>
</html>
