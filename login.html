<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TASY - Login</title>
<meta name="theme-color" content="#1d4e80">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="css/styles.css?v=20260306scp2">
<link rel="stylesheet" href="css/mobile.css?v=20260306scp1">
</head>
<body class="login-page">
  <main class="login-card">
    <h1>DIMENSIONAMENTO DE ENFERMAGEM</h1>
    <form id="loginForm" class="login-form" autocomplete="on">
      <div class="login-avatar-wrap">
        <img id="loginAvatar" src="images/avatar.jpg?v=20260305fixavatar3" alt="Avatar do usuario" class="login-avatar" onerror="this.src='images/avatar.svg?v=20260305fixavatar3'">
        <div id="loginAvatarNome" class="login-avatar-nome">Bem-vindo</div>
      </div>
      <label>Usuario
        <input type="text" id="loginUsuario" placeholder="Digite o usuario" required>
      </label>
      <label>Senha
        <input type="password" id="loginSenha" placeholder="Digite a senha" required>
      </label>
      <button type="submit">Entrar</button>
      <div id="loginErro" class="login-erro" role="alert" aria-live="polite"></div>
    </form>
  </main>
  <script src="js/auth.js?v=20260305av"></script>
  <script src="js/login.js?v=20260305av"></script>
</body>
</html>
